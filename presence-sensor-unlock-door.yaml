blueprint:
  name: Närvaro-baserad smartlås med auto-lås + manuell brytare
  description: >
    Låser upp efter närvaro. Auto-låser vid ingen närvaro eller när dörren stängs. 
    Kan stängas av via en brytare på dashboarden.
  domain: automation
  input:
    presence_sensor:
      name: Närvarosensor
      selector:
        entity:
          domain: binary_sensor

    lock_entity:
      name: Smartlås
      selector:
        entity:
          domain: lock

    door_contact:
      name: Dörrkontakt (magnetbrytare)
      selector:
        entity:
          domain: binary_sensor

    enable_switch:
      name: Aktivera/avaktivera auto-lås
      description: Välj en "Toggle Helper" (switch) som du kan ha på dashboarden.
      selector:
        entity:
          domain: switch

    unlock_delay:
      name: Fördröjning innan upplåsning (sek)
      default: 10
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: seconds

    no_presence_delay:
      name: Fördröjning auto-lås ingen närvaro (sek)
      default: 300
      selector:
        number:
          min: 30
          max: 1800
          unit_of_measurement: seconds

    door_close_delay:
      name: Fördröjning efter dörr stängs (sek)
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds

mode: restart

trigger:
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    for:
      seconds: !input unlock_delay
    id: "unlock"

  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    for:
      seconds: !input no_presence_delay
    id: "lock_no_presence"

  - platform: state
    entity_id: !input door_contact
    to: "off"
    for:
      seconds: !input door_close_delay
    id: "lock_door_closed"

condition:
  # Endast kör om brytaren är på
  - condition: state
    entity_id: !input enable_switch
    state: "on"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "unlock"
        sequence:
          - service: lock.unlock
            target:
              entity_id: !input lock_entity

      - conditions:
          - condition: trigger
            id: "lock_no_presence"
          - condition: state
            entity_id: !input enable_switch
            state: "on"
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity

      - conditions:
          - condition: trigger
            id: "lock_door_closed"
          - condition: state
            entity_id: !input enable_switch
            state: "on"
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity
