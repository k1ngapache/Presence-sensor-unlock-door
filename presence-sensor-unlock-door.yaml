blueprint:
  name: Närvaro-baserad smartlås med auto-lås + input_boolean
  name: Närvaro-baserad smartlås (dörr + garage) med input_boolean
  description: >
    Upplåser vid närvaro. Auto-låser vid ingen närvaro eller dörrstängning. 
    Brytaren (input_boolean) styr bara auto-låsningen.
    Upplåser ytterdörren vid närvaro. 
    Auto-låser både ytterdörren och garaget när toggle är på.
  domain: automation
  input:
    presence_sensor:
      name: Närvarosensor
      name: Närvarosensor (ytterdörr)
      selector:
        entity:
          domain: binary_sensor

    lock_entity:
      name: Smartlås
    front_door_lock:
      name: Ytterdörrens smartlås
      selector:
        entity:
          domain: lock

    garage_lock:
      name: Garagets smartlås
      selector:
        entity:
          domain: lock

    door_contact:
      name: Dörrkontakt (magnetbrytare)
      name: Ytterdörrens kontakt (magnetbrytare)
      selector:
        entity:
          domain: binary_sensor

    enable_boolean:
      name: Aktivera/avaktivera AUTO-LÅS (ej upplåsning)
      description: input_boolean som styr auto-låsningen (upplåsning fungerar alltid).
      name: Aktivera/avaktivera AUTO-LÅS
      description: input_boolean som styr all auto-låsning.
      selector:
        entity:
          domain: input_boolean

    unlock_delay:
      name: Fördröjning innan upplåsning (sek)
      name: Fördröjning upplåsning ytterdörr (sek)
      default: 10
      selector:
        number:
@@ -49,50 +55,69 @@ blueprint:
          unit_of_measurement: seconds

    door_close_delay:
      name: Fördröjning efter dörr stängs (sek)
      name: Fördröjning auto-lås efter ytterdörr stängs (sek)
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds

    garage_lock_delay:
      name: Fördröjning auto-lås garage (sek)
      description: Hur lång tid efter att garage är stängt + toggle på innan det låses.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds

mode: restart

trigger:
  # Ytterdörr – upplåsning
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    for:
      seconds: !input unlock_delay
    id: "unlock"
    id: "front_unlock"

  # Ytterdörr – auto-lås ingen närvaro
  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    for:
      seconds: !input no_presence_delay
    id: "lock_no_presence"

  # Ytterdörr – auto-lås vid stängning
  - platform: state
    entity_id: !input door_contact
    to: "off"
    for:
      seconds: !input door_close_delay
    id: "lock_door_closed"
    id: "front_door_closed"

  # Garage – auto-lås när det är stängt och toggle är på
  - platform: state
    entity_id: !input garage_lock
    to: "unlocked"
    id: "garage_unlocked"

action:
  - choose:
      # === UPPÅSNING (fungerar alltid) ===
      # Upplåsning ytterdörr (alltid)
      - conditions:
          - condition: trigger
            id: "unlock"
            id: "front_unlock"
        sequence:
          - service: lock.unlock
            target:
              entity_id: !input lock_entity
              entity_id: !input front_door_lock

      # === AUTO-LÅSNING (respekterar brytaren) ===
      # Auto-lås ytterdörr vid ingen närvaro
      - conditions:
          - condition: trigger
            id: "lock_no_presence"
@@ -102,15 +127,33 @@ action:
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity
              entity_id: !input front_door_lock

      # Auto-lås ytterdörr när den stängs
      - conditions:
          - condition: trigger
            id: "lock_door_closed"
            id: "front_door_closed"
          - condition: state
            entity_id: !input enable_boolean
            state: "on"
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity
              entity_id: !input front_door_lock

      # Auto-lås garage när det är olåst + toggle på
      - conditions:
          - condition: trigger
            id: "garage_unlocked"
          - condition: state
            entity_id: !input enable_boolean
            state: "on"
        sequence:
          - delay:
              seconds: !input garage_lock_delay
          - condition: state
            entity_id: !input garage_lock
            state: "unlocked"   # dubbelkolla att det fortfarande är olåst
          - service: lock.lock
            target:
              entity_id: !input garage_lock
