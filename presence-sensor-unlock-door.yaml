blueprint:
  name: Närvaro-baserad smartlås med auto-lås
  description: >
    Låser upp efter närvaro + auto-lås vid ingen närvaro eller när dörren stängs igen.
  domain: automation
  input:
    presence_sensor:
      name: Närvarosensor
      selector:
        entity:
          domain: binary_sensor
    lock_entity:
      name: Smartlås
      selector:
        entity:
          domain: lock
    door_contact:
      name: Dörrkontakt (magnetbrytare)
      selector:
        entity:
          domain: binary_sensor
    unlock_delay:
      name: Fördröjning upplåsning (sekunder)
      default: 10
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: seconds
    no_presence_delay:
      name: Fördröjning auto-lås ingen närvaro (sekunder)
      default: 300
      selector:
        number:
          min: 30
          max: 1800
          unit_of_measurement: seconds
    door_close_delay:
      name: Fördröjning efter dörr stängs (sekunder)
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds

mode: restart

trigger:
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    for:
      seconds: !input unlock_delay
    id: unlock

  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    for:
      seconds: !input no_presence_delay
    id: lock_no_presence

  - platform: state
    entity_id: !input door_contact
    to: "off"   # closed
    for:
      seconds: !input door_close_delay
    id: lock_door_closed

condition:
  - condition: template
    value_template: >
      {% set lock = states('{{ lock_entity }}') %}
      {% set pres = states('{{ presence_sensor }}') %}
      {{ lock not in ['unavailable', 'unknown'] and pres not in ['unavailable', 'unknown'] }}

action:
  - variables:
      lock_entity: !input lock_entity
      presence_sensor: !input presence_sensor

  - choose:
      - conditions:
          - condition: trigger
            id: unlock
        sequence:
          - service: lock.unlock
            target:
              entity_id: !input lock_entity

      - conditions:
          - condition: trigger
            id: lock_no_presence
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity

      - conditions:
          - condition: trigger
            id: lock_door_closed
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity
