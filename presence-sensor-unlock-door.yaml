blueprint:
  name: Närvaro-baserad smartlås med auto-lås + input_boolean
  description: >
    Upplåser vid närvaro. Auto-låser vid ingen närvaro eller dörrstängning. 
    Brytaren (input_boolean) styr bara auto-låsningen.
  domain: automation
  input:
    presence_sensor:
      name: Närvarosensor
      selector:
        entity:
          domain: binary_sensor

    lock_entity:
      name: Smartlås
      selector:
        entity:
          domain: lock

    door_contact:
      name: Dörrkontakt (magnetbrytare)
      selector:
        entity:
          domain: binary_sensor

    enable_boolean:
      name: Aktivera/avaktivera AUTO-LÅS (ej upplåsning)
      description: input_boolean som styr auto-låsningen (upplåsning fungerar alltid).
      selector:
        entity:
          domain: input_boolean

    unlock_delay:
      name: Fördröjning innan upplåsning (sek)
      default: 10
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: seconds

    no_presence_delay:
      name: Fördröjning auto-lås ingen närvaro (sek)
      default: 300
      selector:
        number:
          min: 30
          max: 1800
          unit_of_measurement: seconds

    door_close_delay:
      name: Fördröjning efter dörr stängs (sek)
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds

mode: restart

trigger:
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    for:
      seconds: !input unlock_delay
    id: "unlock"

  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    for:
      seconds: !input no_presence_delay
    id: "lock_no_presence"

  - platform: state
    entity_id: !input door_contact
    to: "off"
    for:
      seconds: !input door_close_delay
    id: "lock_door_closed"

action:
  - choose:
      # === UPPÅSNING (fungerar alltid) ===
      - conditions:
          - condition: trigger
            id: "unlock"
        sequence:
          - service: lock.unlock
            target:
              entity_id: !input lock_entity

      # === AUTO-LÅSNING (respekterar brytaren) ===
      - conditions:
          - condition: trigger
            id: "lock_no_presence"
          - condition: state
            entity_id: !input enable_boolean
            state: "on"
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity

      - conditions:
          - condition: trigger
            id: "lock_door_closed"
          - condition: state
            entity_id: !input enable_boolean
            state: "on"
        sequence:
          - service: lock.lock
            target:
              entity_id: !input lock_entity
