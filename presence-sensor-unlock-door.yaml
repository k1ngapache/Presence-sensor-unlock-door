blueprint:
  name: Närvaro-baserad smartlås (dörr + garage) med input_boolean
  description: >
    Upplåser ytterdörren vid närvaro. 
    Auto-låser både ytterdörren och garaget när toggle är på.
  domain: automation
  input:
    presence_sensor:
      name: Närvarosensor (ytterdörr)
      selector:
        entity:
          domain: binary_sensor

    front_door_lock:
      name: Ytterdörrens smartlås
      selector:
        entity:
          domain: lock

    garage_lock:
      name: Garagets smartlås
      selector:
        entity:
          domain: lock

    door_contact:
      name: Ytterdörrens kontakt (magnetbrytare)
      selector:
        entity:
          domain: binary_sensor

    enable_boolean:
      name: Aktivera/avaktivera AUTO-LÅS
      description: input_boolean som styr all auto-låsning.
      selector:
        entity:
          domain: input_boolean

    unlock_delay:
      name: Fördröjning upplåsning ytterdörr (sek)
      default: 10
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: seconds

    no_presence_delay:
      name: Fördröjning auto-lås ingen närvaro (sek)
      default: 300
      selector:
        number:
          min: 30
          max: 1800
          unit_of_measurement: seconds

    door_close_delay:
      name: Fördröjning auto-lås efter ytterdörr stängs (sek)
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds

    garage_lock_delay:
      name: Fördröjning auto-lås garage (sek)
      description: Hur lång tid efter att garage är stängt + toggle på innan det låses.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds

mode: restart

trigger:
  # Ytterdörr – upplåsning
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    for:
      seconds: !input unlock_delay
    id: "front_unlock"

  # Ytterdörr – auto-lås ingen närvaro
  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    for:
      seconds: !input no_presence_delay
    id: "lock_no_presence"

  # Ytterdörr – auto-lås vid stängning
  - platform: state
    entity_id: !input door_contact
    to: "off"
    for:
      seconds: !input door_close_delay
    id: "front_door_closed"

  # Garage – auto-lås när det är stängt och toggle är på
  - platform: state
    entity_id: !input garage_lock
    to: "unlocked"
    id: "garage_unlocked"

action:
  - choose:
      # Upplåsning ytterdörr (alltid)
      - conditions:
          - condition: trigger
            id: "front_unlock"
        sequence:
          - service: lock.unlock
            target:
              entity_id: !input front_door_lock

      # Auto-lås ytterdörr vid ingen närvaro
      - conditions:
          - condition: trigger
            id: "lock_no_presence"
          - condition: state
            entity_id: !input enable_boolean
            state: "on"
        sequence:
          - service: lock.lock
            target:
              entity_id: !input front_door_lock

      # Auto-lås ytterdörr när den stängs
      - conditions:
          - condition: trigger
            id: "front_door_closed"
          - condition: state
            entity_id: !input enable_boolean
            state: "on"
        sequence:
          - service: lock.lock
            target:
              entity_id: !input front_door_lock

      # Auto-lås garage när det är olåst + toggle på
      - conditions:
          - condition: trigger
            id: "garage_unlocked"
          - condition: state
            entity_id: !input enable_boolean
            state: "on"
        sequence:
          - delay:
              seconds: !input garage_lock_delay
          - condition: state
            entity_id: !input garage_lock
            state: "unlocked"   # dubbelkolla att det fortfarande är olåst
          - service: lock.lock
            target:
              entity_id: !input garage_lock
